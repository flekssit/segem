<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360 Sanal Tur Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        #panorama { width: 100%; height: 100vh; }
        body { margin: 0; }
        
/* Özel İkon Tasarımı (PNG Görsel ile) */
        .custom-hotspot {
            height: 24px; /* İkonun ekrandaki yüksekliği */
            width: 64px;  /* İkonun ekrandaki genişliği */
            background-image: url('ok04.png'); /* İKON GÖRSELİNİN ADI BURAYA */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
            /* box-shadow ve border'ı sildik, ikonun kendi gölgesi varsa daha iyi */
        }
        /* Eski ok işaretini (:after) kaldırıyoruz */
        .custom-hotspot:after {
            content: none;
        }
    </style>
</head>
<body>

<div id="panorama"></div>

<script>
pannellum.viewer('panorama', {   
    "default": {
        "firstScene": "giris0",
        "author": "FLEKSSİT",
        "sceneFadeDuration": 1000,
        "autoLoad": true,
       // "hotSpotDebug": true,
        "autoRotate": -2 // Otomatik yavaş dönüş ekledik
    },

    "scenes": {
        "giris0": {
            "title": "Giriş",
            "panorama": "giris0.jpg",
            "hotSpots": [
                {
                    "pitch": -6,
                    "yaw": 166,
                    "type": "scene",
                    "text": "Bekleme Alanı",
                    "sceneId": "giris1",
                    "createTooltipArgs": "Bekleme Alanı",
                    "cssClass": "custom-hotspot" // Özel stilimizi burada çağırdık
                }
            ]
        },

        "giris1": {
            "title": "Bekleme Alanı",
            "panorama": "giris1.jpg",
            "hotSpots": [
                {
                    "pitch": -10,
                    "yaw": -110,
                    "type": "scene",
                    "text": "Girişe Dön",
                    "sceneId": "giris0",
                    "cssClass": "custom-hotspot"
                },
                {
                    "pitch": -10,
                    "yaw": -110,
                    "type": "scene",
                    "text": "Oda 4",
                    "sceneId": "oda4",
                    "cssClass": "custom-hotspot"
                },
                {
                    "pitch": -12,
                    "yaw": 127,
                    "type": "scene",
                    "text": "Bekleme Alanı",
                    "sceneId": "giris2",
                    "cssClass": "custom-hotspot"
                }
            ]
        },

        "yatak_odasi": {
            "title": "Yatak Odası",
            "panorama": "yatak_odasi.jpg",
            "hotSpots": [
                {
                    "pitch": -1,
                    "yaw": 40,
                    "type": "scene",
                    "text": "Mutfağa Dön",
                    "sceneId": "mutfak",
                    "cssClass": "custom-hotspot"
                }
            ]
        }
    }
});
</script>

</body>
</html>
